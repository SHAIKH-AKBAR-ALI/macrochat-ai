# Pings the free-tier backend so it doesn't sleep (cold start ~50s).
# GitHub cron can drift 5-15 min and disables after 60 days of repo inactivity.
name: keepalive
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - run: curl -sS --max-time 90 https://macrochat-api.onrender.com/health
